<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Blog — Ntrvl</title>
  <meta name="description" content="A post from the Ntrvl blog.">

  <link rel="icon" type="image/png" href="../assets/images/ntrvl-icon.png">
  <link rel="stylesheet" href="../assets/css/style.css">

  <!-- marked.js for markdown rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

  <div class="bg-scene" aria-hidden="true">
    <img class="bg-scene__layer bg-scene__layer--lower" src="../assets/images/bg-lower-layer.svg" alt="">
    <img class="bg-scene__layer bg-scene__layer--mid" src="../assets/images/bg-mid-shading.svg" alt="">
    <img class="bg-scene__layer bg-scene__layer--top" src="../assets/images/bg-top-layer.svg" alt="">
  </div>

  <div class="page">

    <header class="site-header">
      <div class="wrap wrap--wide">
        <a href="/" class="wordmark"><img src="../assets/images/ntrvl-icon.png" alt="" class="wordmark__icon" height="32"><img src="../assets/images/ntrvl-logo-wordmark.png" alt="Ntrvl" height="28"></a>
        <nav aria-label="Main navigation">
          <ul class="site-nav">
            <li><a href="/blog/post?p=why-i-built-ntrvl">Blog</a></li>
            <li><a href="/contact">Contact</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="blog-post">
      <div class="wrap">
        <header>
          <p><a href="/blog/post?p=why-i-built-ntrvl" style="color: var(--text-muted); font-size: 13px;">&larr; Back to blog</a></p>
          <h1 class="page-title" id="post-title" style="margin-top: var(--space-sm);"></h1>
          <p class="meta" id="post-date"></p>
        </header>
        <article class="blog-post__content" id="post-content">
          <p style="color: var(--text-muted);">Loading...</p>
        </article>
      </div>
    </main>

    <footer class="site-footer">
      <div class="wrap wrap--wide">
        <p class="site-footer__copy">Ntrvl is made by Brett Rodgers.</p>
        <nav aria-label="Footer navigation">
          <ul class="site-footer__links">
            <li><a href="/privacy-policy">Privacy Policy</a></li>
            <li><a href="/terms-and-conditions">Terms &amp; Conditions</a></li>
            <li><a href="/support">Contact</a></li>
          </ul>
        </nav>
      </div>
    </footer>

  </div>

  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var slug = params.get('p');

      if (!slug || !/^[\w-]+$/.test(slug)) {
        document.getElementById('post-title').textContent = 'Post not found';
        document.getElementById('post-content').innerHTML = '<p><a href="/blog/post?p=why-i-built-ntrvl">Back to blog</a></p>';
        return;
      }

      fetch('/blog/posts/' + slug + '.md')
        .then(function(res) {
          if (!res.ok) throw new Error('Not found');
          return res.text();
        })
        .then(function(md) {
          // Extract title from first # heading
          var lines = md.split('\n');
          var title = slug;
          var dateStr = '';
          var contentStart = 0;

          // Look for YAML-ish frontmatter (title: and date: lines)
          if (lines[0] && lines[0].trim() === '---') {
            for (var i = 1; i < lines.length; i++) {
              if (lines[i].trim() === '---') {
                contentStart = i + 1;
                break;
              }
              var match;
              if ((match = lines[i].match(/^title:\s*(.+)/))) title = match[1].trim();
              if ((match = lines[i].match(/^date:\s*(.+)/))) dateStr = match[1].trim();
            }
          } else if (lines[0] && lines[0].startsWith('# ')) {
            title = lines[0].replace(/^#\s+/, '');
            contentStart = 1;
          }

          document.getElementById('post-title').textContent = title;
          document.title = title + ' — Ntrvl Blog';
          if (dateStr) document.getElementById('post-date').textContent = dateStr;

          var content = lines.slice(contentStart).join('\n');
          document.getElementById('post-content').innerHTML = marked.parse(content);

          // Style App Store links as buttons
          var contentEl = document.getElementById('post-content');
          var links = contentEl.querySelectorAll('a[href*="apps.apple.com"]');
          links.forEach(function(link) {
            link.classList.add('btn', 'btn--primary');
          });
        })
        .catch(function() {
          document.getElementById('post-title').textContent = 'Post not found';
          document.getElementById('post-content').innerHTML = '<p><a href="/blog/post?p=why-i-built-ntrvl">Back to blog</a></p>';
        });
    })();
  </script>
</body>
</html>
