<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact — Ntrvl</title>
  <meta name="description" content="Have a question, found a bug, or want to share feedback about Ntrvl? Get in touch.">

  <meta property="og:title" content="Contact — Ntrvl">
  <meta property="og:description" content="Have a question, found a bug, or want to share feedback about Ntrvl? Get in touch.">
  <meta property="og:url" content="https://ntrvlapp.com/contact">
  <meta property="og:type" content="website">

  <link rel="canonical" href="https://ntrvlapp.com/contact">
  <link rel="icon" type="image/png" href="assets/images/ntrvl-icon.png">
  <link rel="stylesheet" href="assets/css/style.css">

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebPage",
    "name": "Contact — Ntrvl",
    "description": "Get in touch with the Ntrvl team.",
    "url": "https://ntrvlapp.com/contact",
    "isPartOf": {
      "@type": "WebSite",
      "name": "Ntrvl",
      "url": "https://ntrvlapp.com"
    }
  }
  </script>
</head>
<body>

  <div class="bg-scene" aria-hidden="true">
    <img class="bg-scene__layer bg-scene__layer--lower" src="assets/images/bg-lower-layer.svg" alt="">
    <img class="bg-scene__layer bg-scene__layer--mid" src="assets/images/bg-mid-shading.svg" alt="">
    <img class="bg-scene__layer bg-scene__layer--top" src="assets/images/bg-top-layer.svg" alt="">
  </div>

  <div class="page">

    <header class="site-header">
      <div class="wrap wrap--wide">
        <a href="/" class="wordmark"><img src="assets/images/ntrvl-icon.png" alt="" class="wordmark__icon" height="32"><img src="assets/images/ntrvl-logo-wordmark.png" alt="Ntrvl" height="28"></a>
        <nav aria-label="Main navigation">
          <ul class="site-nav">
            <li><a href="/blog/">Blog</a></li>
            <li><a href="/contact" aria-current="page">Contact</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="support-content">
      <div class="wrap">
        <header>
          <h1 class="page-title" style="margin-bottom: var(--space-md);">Get in touch.</h1>
        </header>

        <section>
          <p>Have a question about Ntrvl? Ran into something that doesn't seem right? Or just have an idea for how to make it better? We'd love to hear from you.</p>
        </section>

        <section style="margin-top: var(--space-lg);">
          <a href="mailto:ntrvlapp@gmail.com" class="contact-btn">Send us an email</a>
        </section>
      </div>
    </main>

    <footer class="site-footer">
      <div class="wrap wrap--wide">
        <p class="site-footer__copy">Ntrvl is made by Brett Rodgers.</p>
        <nav aria-label="Footer navigation">
          <ul class="site-footer__links">
            <li><a href="/privacy-policy">Privacy Policy</a></li>
            <li><a href="/terms-and-conditions">Terms &amp; Conditions</a></li>
            <li><a href="/contact">Support</a></li>
          </ul>
        </nav>
      </div>
    </footer>

  </div>
</body>
</html>
